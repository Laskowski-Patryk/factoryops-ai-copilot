services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_PATH: /app/data/factoryops.sqlite3
      RUNS_JSONL_PATH: /app/data/runs.jsonl
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000

volumes:
  backend-data:
